apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-html-deployment
  labels:
    app: simple-html
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-html
  template:
    metadata:
      labels:
        app: simple-html
    spec:
      containers:
      - name: simple-html-container
        image: puremahadi/devops-simple-html:b70d9b08db18c3f61126c8da90d223211a3574ad
        imagePullPolicy: Always
        ports:
        - containerPort: 80

