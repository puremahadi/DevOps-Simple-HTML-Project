name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: puremahadi
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        id: build_and_push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: puremahadi/devops-simple-html:${{ github.sha }}

      - name: Update Kubernetes resources
        run: |
          # আপনার ফাইলের নাম k8s-deployment.yaml অনুযায়ী sed আপডেট করা হয়েছে
          sed -i "s|image: puremahadi/devops-simple-html:.*|image: puremahadi/devops-simple-html:${{ github.sha }}|g" k8s-deployment.yaml
          
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add k8s-deployment.yaml
          git commit -m "Update image tag to ${{ github.sha }}"
          git push

      - name: Image digest
        run: echo ${{ steps.build_and_push.outputs.digest }}